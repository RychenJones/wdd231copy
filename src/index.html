<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NPS PARK DEMO SITE - WDD231</title>
  <link rel="stylesheet" href="/css/style.css">
  <script type="module" src="/js/main.js" defer></script>
</head>

<body>
  <div id="content">
    <header>
      <h1>US NATIONAL PARKS</h1>
      <nav>
        <p id="header-menu-trigger">≡ MENU</p>
        <div id="header-menu-options" class="is-hidden">
          <ul>
            <li>INFO</li>
            <li>ALERTS</li>
            <li>MAPS</li>
            <li>EVENTS</li>
            <li>FEES</li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <section id="hero">
        <img src="/images/us-map.png" alt="Map of the US">
      </section>
      <section id="overview">
        <h2 id="parkName">Park Name</h2>
        <div>
          <p id="parkType">Park Type</p>
          <p id="parkStates">Park States</p>
        </div>
      </section>
      <section id="parkMenu">
        <ul>
          <li>
            <p>INFO</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#info"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>ALERTS</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#safety-caution-alerts"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>MAPS</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#maps"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>EVENTS</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#event"></use>
              </svg>
            </p>
          </li>
          <li>
            <p>FEES</p>
            <p>
              <svg>
                <use href="/images/sprite.svg#passes-and-fees"></use>
              </svg>
            </p>
          </li>
        </ul>
      </section>
    </main>
    <footer>
      <p>&copy; 2026 WDD231 Sample Project</p>
    </footer>
  </div>
</body>

</html>
