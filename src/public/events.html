<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="dont-click">DON'T TOUCH ME</button>
</body>
<script>
    function clickMe(){
        alert("YOU CLICKED THE BUTTON!");
    }

    var button = document.getElementById("dont-click");
    button.addEventListener("click", clickMe)
</script>
</html>
